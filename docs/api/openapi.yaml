openapi: 3.0.3
info:
  title: Oando Platform API
  description: API endpoints for the Oando workspace planner and product catalog platform.
  version: 1.0.0
  contact:
    name: Oando Platform
servers:
  - url: /api
    description: Relative to application origin

paths:
  /plans:
    get:
      summary: List plans
      description: Retrieve all plans for the authenticated user.
      tags: [Plans]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, archived]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create plan
      description: Create a new planner document.
      tags: [Plans]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlanRequest'
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /plans/{id}:
    get:
      summary: Get plan by ID
      tags: [Plans]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update plan
      tags: [Plans]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlanRequest'
      responses:
        '200':
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete plan
      tags: [Plans]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Plan deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/catalog:
    get:
      summary: List catalog items
      description: Admin endpoint to list all catalog items.
      tags: [Admin Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Catalog items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      summary: Create catalog item
      tags: [Admin Catalog]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCatalogItemRequest'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItem'
        '400':
          $ref: '#/components/responses/BadRequest'

  /admin/catalog/{id}:
    get:
      summary: Get catalog item
      tags: [Admin Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Catalog item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItem'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update catalog item
      tags: [Admin Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCatalogItemRequest'
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItem'

    delete:
      summary: Delete catalog item
      tags: [Admin Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Item deleted

  /customer-queries:
    post:
      summary: Submit customer query
      description: Public endpoint for customer inquiries. No auth required.
      tags: [Customer Queries]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerQueryRequest'
      responses:
        '201':
          description: Query submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  id:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /recommendations:
    get:
      summary: Get product recommendations
      description: AI-powered product recommendations based on a seed product.
      tags: [Recommendations]
      parameters:
        - name: product_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
            maximum: 20
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Recommendations list
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommendations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Recommendation'
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object

    Plan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
        engine:
          type: string
          enum: [fabric, threejs]
        payload:
          type: object
        thumbnailUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, active, archived]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePlanRequest:
      type: object
      required: [name, engine, payload]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        engine:
          type: string
          enum: [fabric, threejs]
        payload:
          type: object

    UpdatePlanRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        payload:
          type: object
        status:
          type: string
          enum: [draft, active, archived]

    CatalogItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        dimensions:
          type: object
          properties:
            width:
              type: number
            depth:
              type: number
            height:
              type: number
        price:
          type: number
          nullable: true
        images:
          type: array
          items:
            type: string

    CreateCatalogItemRequest:
      type: object
      required: [name, category, dimensions]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        category:
          type: string
          minLength: 1
          maxLength: 100
        dimensions:
          type: object
          required: [width, depth, height]
          properties:
            width:
              type: number
              exclusiveMinimum: 0
            depth:
              type: number
              exclusiveMinimum: 0
            height:
              type: number
              exclusiveMinimum: 0
        price:
          type: number
          nullable: true
        images:
          type: array
          items:
            type: string
            format: uri

    UpdateCatalogItemRequest:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        dimensions:
          type: object
        price:
          type: number
        images:
          type: array
          items:
            type: string

    CustomerQueryRequest:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
        phone:
          type: string
          maxLength: 20
        message:
          type: string
          minLength: 1
          maxLength: 5000
        productInterest:
          type: string
          maxLength: 200

    Recommendation:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        image:
          type: string
        score:
          type: number
        reason:
          type: string
